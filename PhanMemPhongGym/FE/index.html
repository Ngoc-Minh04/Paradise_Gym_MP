<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paradise GYM - Quản lý</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-error-container": "#93000a", "inverse-surface": "#2d3135", "on-surface": "#181c20",
            "inverse-on-surface": "#eef1f6", "surface-container-highest": "#e0e3e8", "on-primary": "#ffffff",
            "on-tertiary-container": "#fffbff", "surface-bright": "#f7f9ff", "surface-container-low": "#f1f4f9",
            "surface-dim": "#d7dadf", "surface": "#f7f9ff", "tertiary-fixed-dim": "#ffb1c4",
            "surface-tint": "#006e21", "primary-fixed-dim": "#6fde76", "on-surface-variant": "#3f4a3c",
            "inverse-primary": "#6fde76", "tertiary-fixed": "#ffd9e1", "tertiary-container": "#c54772",
            "tertiary": "#a52d59", "on-tertiary-fixed-variant": "#891544", "on-tertiary": "#ffffff",
            "primary-fixed": "#8bfb8f", "error": "#ba1a1a", "outline": "#6e7a6b", "on-secondary": "#ffffff",
            "background": "#f7f9ff", "secondary": "#575f67", "on-secondary-fixed": "#141d23",
            "surface-variant": "#e0e3e8", "on-background": "#181c20", "surface-container-high": "#e5e8ee",
            "secondary-container": "#d8e1ea", "surface-container-lowest": "#ffffff", "error-container": "#ffdad6",
            "secondary-fixed": "#dbe4ed", "outline-variant": "#becab9", "on-tertiary-fixed": "#3f001a",
            "on-error": "#ffffff", "surface-container": "#ebeef3", "on-secondary-fixed-variant": "#3f484f",
            "on-primary-container": "#f7fff1", "secondary-fixed-dim": "#bfc8d0", "primary-container": "#03872c",
            "on-secondary-container": "#5b646b", "on-primary-fixed-variant": "#005317", "primary": "#006b20",
            "on-primary-fixed": "#002105", "brand-primary": "#1D9336"
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
          spacing: {
            "xs": "4px", "md": "16px", "gutter": "24px", "margin": "32px", "sm": "8px",
            "xl": "32px", "base": "4px", "2xl": "48px", "lg": "24px", "loose": "20px",
            "standard": "10px", "compact": "8px", "atom": "5px"
          },
          fontFamily: {
            "display-lg": ["Inter"], "body-md": ["Inter"], "headline": ["Inter"], "body-lg": ["Inter"],
            "label-bold": ["Inter"], "label-md": ["Inter"], "display-md": ["Inter"], "body-sm": ["Inter"],
            "display-2xl": ["Inter"], "display-xl": ["Inter"]
          },
          fontSize: {
            "display-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "headline": ["20px", { lineHeight: "28px", fontWeight: "600" }],
            "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "label-bold": ["12px", { lineHeight: "16px", letterSpacing: "0.02em", fontWeight: "600" }],
            "label-md": ["12px", { lineHeight: "16px", fontWeight: "500" }],
            "display-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "600" }],
            "body-sm": ["12px", { lineHeight: "16px", fontWeight: "400" }],
            "display-2xl": ["20px", { lineHeight: "28px", fontWeight: "600" }],
            "display-xl": ["16px", { lineHeight: "24px", fontWeight: "600" }],
            "label-xs": ["9.6px", { lineHeight: "14px", letterSpacing: "0.02em", fontWeight: "500" }]

        }
      }

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.3/air-datepicker.css" />
  <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.3/air-datepicker.js"></script>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="font-body-md text-body-md overflow-hidden bg-background text-on-surface">

<script>
  window.GymApp = { 
    data: { 
      members: [], pts: [], packages: [], checkins: [], ptSchedules: [], ptBookings: [], stats: null 
    }, 
    pages: {}, 
    currentPage: null 
  };
</script>

<div class="flex h-screen w-full overflow-hidden">

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar" class="flex flex-col h-full bg-surface-container-low border-r border-outline-variant w-64 flex-shrink-0">

    <!-- Toggle + Logo -->
    <div class="sidebar-toggle-area flex items-center border-b border-outline-variant px-compact py-standard gap-compact flex-shrink-0">
      <button id="sidebar-toggle" class="p-atom rounded-lg hover:bg-surface-container transition-colors flex-shrink-0" title="Thu gọn / Mở rộng">
        <span class="material-symbols-outlined text-on-surface-variant text-xl">menu</span>
      </button>
      <div class="sidebar-label flex items-center gap-compact overflow-hidden flex-1">
        <div class="w-7 h-7 bg-brand-primary rounded-lg flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-white" style="font-size:15px">fitness_center</span>
        </div>
        <div class="min-w-0">
          <h1 class="font-display-xl text-display-xl text-brand-primary font-bold leading-tight whitespace-nowrap">Paradise GYM</h1>
          <p class="text-on-surface-variant font-body-sm text-body-sm">v1.0.0</p>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-grow overflow-y-auto px-compact py-standard space-y-atom overflow-x-hidden">

      <!-- Tổng quan -->
      <button
        class="nav-item flex items-center gap-standard w-full px-standard py-compact rounded-lg text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors"
        data-page="dashboard" title="Tổng quan"
      >
        <span class="material-symbols-outlined text-xl flex-shrink-0">dashboard</span>
        <span class="sidebar-label font-body-md text-body-md">Tổng quan</span>
      </button>

      <!-- Quản lý hội viên (Accordion) -->
      <div class="accordion-group">
        <button
          class="accordion-trigger flex items-center gap-standard w-full px-standard py-compact rounded-lg text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors"
          data-accordion="hoi-vien" title="Quản lý hội viên"
        >
          <span class="material-symbols-outlined text-xl flex-shrink-0">people</span>
          <span class="sidebar-label font-body-md text-body-md flex-1 text-left">Quản lý hội viên</span>
          <span class="material-symbols-outlined text-sm arrow-icon transition-transform duration-200 sidebar-label flex-shrink-0">chevron_right</span>
        </button>

        <div class="accordion-content overflow-hidden" id="accordion-hoi-vien" style="max-height:0; transition: max-height 0.25s ease;">
          <div class="pl-7 py-atom space-y-atom">

            <button class="sub-nav-item flex items-center gap-compact w-full px-standard py-compact rounded-lg text-body-sm text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors" data-page="members-list" title="Danh sách hội viên">
              <span class="material-symbols-outlined text-sm flex-shrink-0">format_list_bulleted</span>
              <span class="sidebar-label">Danh sách hội viên</span>
            </button>

            <button class="sub-nav-item flex items-center gap-compact w-full px-standard py-compact rounded-lg text-body-sm text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors" data-page="member-add" title="Thêm mới hội viên">
              <span class="material-symbols-outlined text-sm flex-shrink-0">person_add</span>
              <span class="sidebar-label">Thêm mới hội viên</span>
            </button>

            <button class="sub-nav-item flex items-center gap-compact w-full px-standard py-compact rounded-lg text-body-sm text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors" data-page="checkin" title="Vào - Ra">
              <span class="material-symbols-outlined text-sm flex-shrink-0">login</span>
              <span class="sidebar-label">Vào - Ra</span>
            </button>

            <button class="sub-nav-item flex items-center gap-compact w-full px-standard py-compact rounded-lg text-body-sm text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors" data-page="expired" title="Danh sách hết hạn">
              <span class="material-symbols-outlined text-sm flex-shrink-0">event_busy</span>
              <span class="sidebar-label">Danh sách hết hạn</span>
            </button>

            <button class="sub-nav-item flex items-center gap-compact w-full px-standard py-compact rounded-lg text-body-sm text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors" data-page="pt-training" title="Lịch đào tạo PT">
              <span class="material-symbols-outlined text-sm flex-shrink-0">sports_gymnastics</span>
              <span class="sidebar-label">Lịch đào tạo PT</span>
            </button>

            <button class="sub-nav-item flex items-center gap-compact w-full px-standard py-compact rounded-lg text-body-sm text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors" data-page="pt-register" title="Đăng ký lịch tập PT">
              <span class="material-symbols-outlined text-sm flex-shrink-0">edit_calendar</span>
              <span class="sidebar-label">Đăng ký lịch tập PT</span>
            </button>

            <button class="sub-nav-item flex items-center gap-compact w-full px-standard py-compact rounded-lg text-body-sm text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors" data-page="packages" title="Danh sách gói tập">
              <span class="material-symbols-outlined text-sm flex-shrink-0">card_membership</span>
              <span class="sidebar-label">Danh sách gói tập</span>
            </button>

            <button class="sub-nav-item flex items-center gap-compact w-full px-standard py-compact rounded-lg text-body-sm text-on-surface-variant hover:text-brand-primary hover:bg-surface-container transition-colors" data-page="birthday" title="Sinh nhật">
              <span class="material-symbols-outlined text-sm flex-shrink-0">cake</span>
              <span class="sidebar-label">Sinh nhật</span>
            </button>

          </div>
        </div>
      </div>
    </nav>

    <!-- Đăng xuất -->
    <div class="border-t border-outline-variant px-compact py-standard flex-shrink-0">
      <button class="flex items-center gap-standard w-full px-standard py-compact rounded-lg text-on-surface-variant hover:text-error hover:bg-error-container transition-colors" title="Đăng xuất">
        <span class="material-symbols-outlined text-xl flex-shrink-0">logout</span>
        <span class="sidebar-label font-body-md text-body-md">Đăng xuất</span>
      </button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

    <!-- Header -->
    <header class="flex justify-end items-center px-loose w-full bg-surface border-b border-outline-variant h-12 flex-shrink-0 gap-standard">
      <button id="theme-toggle" class="material-symbols-outlined text-on-surface-variant hover:text-brand-primary p-atom rounded transition-colors" title="Chuyển chế độ sáng/tối">
        <span id="theme-icon">dark_mode</span>
      </button>
      <button class="material-symbols-outlined text-on-surface-variant hover:text-brand-primary p-atom rounded transition-colors">notifications</button>
      <button class="material-symbols-outlined text-on-surface-variant hover:text-brand-primary p-atom rounded transition-colors">settings</button>
      <div class="flex items-center gap-compact ml-compact">
        <div class="w-7 h-7 rounded-full bg-brand-primary flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-sm">person</span>
        </div>
        <span class="text-body-sm text-on-surface font-bold">Admin</span>
      </div>
    </header>

    <!-- Content Area -->
    <main id="content-area" class="flex-grow overflow-y-auto bg-background p-loose">
      <div class="flex items-center justify-center h-full">
        <div class="text-center">
          <span class="material-symbols-outlined text-6xl text-outline">fitness_center</span>
          <p class="text-on-surface-variant mt-standard">Đang tải...</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Global Data synced via app.js -->
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/pages/dashboard.js"></script>
<script src="assets/js/pages/members-list.js"></script>
<script src="assets/js/pages/member-add.js"></script>
<script src="assets/js/pages/checkin.js"></script>
<script src="assets/js/pages/expired.js"></script>
<script src="assets/js/pages/pt-training.js"></script>
<script src="assets/js/pages/pt-register.js"></script>
<script src="assets/js/pages/packages.js"></script>
<script src="assets/js/pages/birthday.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
